<!DOCTYPE>

<html>

<head>
	<title>Braess' Paradox</title>
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1">
	<script src="cytoscape.min.js"></script>
	<script src="jquery-3.4.1.min.js"></script>
	<link rel="stylesheet" href="cytoscape.css"></style>
	<!-- <script src="test_cytoscape.js"></script> -->
	<script src="braess.js"></script>
</head>

<body>
	<div id="cy"></div>
	<div id="helper">
		<p>a: Auto</p>
		<p>s: Switch the bridge (on/off)</p>
		<p>n: Next day</p>
		<p>m: Multiple next day (10)</p>
		<p>r: Reset layout</p>
	</div>
	<div id="stats">
		<p>fastest: <span id="fastest"></span></p>
		<p>fastest road: <span id="fastest-road"></span></p>
		<p>slowest: <span id="slowest"></span></p>
		<p>average: <span id="average"></span></p>
	</div>
</body>

</html>
